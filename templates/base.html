<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}재고 관리 시스템{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; }
        .sidebar { background-color: #1E2761; }
        .sidebar-link { color: #9CA3AF; transition: color 0.2s; }
        .sidebar-link:hover, .sidebar-link.active { color: white; background-color: #374151; }
        .badge-match { background-color: #10B981; color: white; }
        .badge-mismatch { background-color: #EF4444; color: white; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen flex">
    <!-- 사이드바 -->
    <aside class="sidebar w-64 min-h-screen fixed inset-y-0 left-0 z-50">
        <div class="p-6 border-b border-gray-700">
            <h1 class="text-xl font-bold text-white">재고 관리 시스템</h1>
        </div>
        <nav class="p-4 space-y-2">
            <a href="/" class="sidebar-link flex items-center px-4 py-3 rounded-lg {% if request.url.path == '/' %}active{% endif %}">
                <span class="mr-3">🏠</span> 대시보드
            </a>
            <a href="/adjust" class="sidebar-link flex items-center px-4 py-3 rounded-lg {% if request.url.path == '/adjust' %}active{% endif %}">
                <span class="mr-3">✏️</span> 수기 조정
            </a>
            <a href="/qr" class="sidebar-link flex items-center px-4 py-3 rounded-lg {% if request.url.path == '/qr' %}active{% endif %}">
                <span class="mr-3">📷</span> QR 생성
            </a>
        </nav>
    </aside>

    <!-- 메인 콘텐츠 -->
    <main class="flex-1 ml-64 p-8">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
